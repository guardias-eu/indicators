name: Update Data from emtrends

on:
  schedule:
    # Run every Wednesday at 00:00 UTC
    - cron: '0 0 * * 3'
  workflow_dispatch:  # Allow manual triggering

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'
          use-public-rspm: true

      - name: Install R dependencies
        run: |
          install.packages(c('ggplot2', 'plotly', 'jsonlite'))
        shell: Rscript {0}

      - name: Install Python dependencies
        run: |
          pip install requests

      - name: Download ZIP files and extract RData files
        run: |
          python scripts/download_emtrends_data.py

      - name: Convert ggplot2 objects to Plotly JSON
        run: |
          Rscript scripts/convert_plots_to_plotly.R

      - name: Check for changes
        id: check_changes
        run: |
          if git diff --quiet; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push changes
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          git config --local user.email \
            "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/
          git commit -m \
            "chore: update data files from emtrends repository"
          git push
